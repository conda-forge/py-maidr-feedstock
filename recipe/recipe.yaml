# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.17.2"
  python_check_max: "3.14"

recipe:
  name: py-maidr-split
  version: ${{ version }}

source:
  - target_directory: dist
    url: https://pypi.org/packages/source/m/maidr/maidr-${{ version }}.tar.gz
    sha256: c10a3fc26cb8733436aaaea21d08553493dc04833591adf3ae0c85f7e0777929
  - target_directory: src
    url: https://github.com/xability/py-maidr/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 7d3c1c2fc08d59d299ce77ff8b8fc9a8df64d3ba7c212a2e7f9a3bd04f7f9684

build:
  number: 0
  noarch: python

outputs:
  - package:
      name: py-maidr
    build:
      number: 0
      noarch: python
      script:
        - cd dist
        - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
    requirements:
      host:
        - hatchling
        - pip
        - python ${{ python_min }}.*
      run:
        - htmltools >=0.5
        - lxml >=5.1.0
        - mplfinance >=0.12.10b0
        - numpy >=1.26
        - python >=${{ python_min }}
        - wrapt >=1.16.0,<2
        # undeclared, but import fails without
        - seaborn-base
      run_constraints:
        - seaborn-base >=0.12
        - matplotlib-base >=3.8
        - statsmodels >=0.14.4
    tests:
      - python:
          imports: maidr
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*

  - package:
      name: py-maidr-with-visualization
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage("py-maidr", exact=True) }}
        - flask >=3.0.0
        - seaborn
        - statsmodels
    tests:
      - python:
          imports: maidr
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*
    about:
      summary: Multimodal Access and Interactive Data Representations (with [visualization])

  - package:
      name: py-maidr-with-jupyter
    requirements:
      run:
        - ${{ pin_subpackage("py-maidr", exact=True) }}
        - ipykernel >=6.0.0
        - jupyter >=1.0.0,<2
    tests:
      - python:
          imports: maidr
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*
    about:
      summary: Multimodal Access and Interactive Data Representations (with [jupyter])

  - package:
      name: py-maidr-with-plotly
    requirements:
      run:
        - ${{ pin_subpackage("py-maidr", exact=True) }}
        - plotly >=5.0
    tests:
      - python:
          imports: maidr
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*
    about:
      summary: Multimodal Access and Interactive Data Representations (with [plotly])

  - package:
      name: py-maidr-with-all
    requirements:
      run:
        - ${{ pin_subpackage("py-maidr-with-jupyter", exact=True) }}
        - ${{ pin_subpackage("py-maidr-with-plotly", exact=True) }}
        - ${{ pin_subpackage("py-maidr-with-visualization", exact=True) }}
        - ${{ pin_subpackage("py-maidr", exact=True) }}
    tests:
      - python:
          imports: maidr
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*
      - files:
          source:
            - src/tests/
        requirements:
          run:
            - pytest-cov
            - pytest >=7.3.2,<8
            - pytest-mock >=3.12.0,<4
        script:
          - cd src
          - coverage run --source maidr --branch -m pytest -vv --tb=long --color=yes
          - coverage report --show-missing --skip-covered --fail-under=27
    about:
      summary: Multimodal Access and Interactive Data Representations (with all [extras])

about:
  homepage: https://pypi.org/project/maidr
  summary: Multimodal Access and Interactive Data Representations
  license: GPL-3.0-or-later
  license_file:
    - dist/LICENSE
    # TODO: js licenses?
  repository: https://github.com/xability/py-maidr
  documentation: https://py.maidr.ai

extra:
  feedstock-name: py-maidr
  recipe-maintainers:
    - bollwyvl
